<!-- ===================== PART 1.5/15 — MOBILE UX v5 (BETTER DRIBBLE + BIGGER BUTTONS + COACH COLLAPSE + SPRINT FIX) ===================== -->
<style id="P1_5_MOBILE_V5_STYLE">
  body.mobile-on .touchUI{ display:block !important; }
  body.mobile-off .touchUI{ display:none !important; }

  /* AIM-джойстик скрываем */
  body.mobile-on #aimBase{ display:none !important; }

  /* Подсказки (панель) на телефоне убираем */
  body.mobile-on #hints{ display:none !important; }

  /* ---------- COACH: супер компакт + сворачивание ---------- */
  body.mobile-on .coach{
    width: calc(100% - 12px) !important;
    left: 6px !important;
    bottom: 6px !important;
    border-radius: 18px !important;
    z-index: 5200 !important;
  }
  body.mobile-on .coachHd{
    padding: 6px 9px !important;
  }
  body.mobile-on .coachAvatar{ width:36px !important; height:36px !important; border-radius:14px !important; }
  body.mobile-on .coachMeta .name{ font-size:12px !important; }
  body.mobile-on .coachMeta .role{ font-size:11px !important; }

  /* режим “свернуто” (по умолчанию) */
  body.mobile-on.mobile-coach-collapsed .coach .textBox{
    height: 36px !important;
    font-size: 11.5px !important;
    padding: 6px 8px !important;
  }
  body.mobile-on.mobile-coach-collapsed .coach .btnRow{
    display:none !important;
  }

  /* режим “развернуто” */
  body.mobile-on.mobile-coach-expanded .coach .textBox{
    height: 64px !important;
    font-size: 12px !important;
    padding: 7px 8px !important;
  }
  body.mobile-on.mobile-coach-expanded .coach .btnRow{
    display:flex !important;
    gap: 7px !important;
  }
  body.mobile-on.mobile-coach-expanded .btn{
    padding: 8px 9px !important;
    border-radius: 14px !important;
  }

  /* ---------- JOY: чуть крупнее ---------- */
  body.mobile-on #joyBase{
    width: 184px !important;
    height: 184px !important;
    left: 10px !important;
    bottom: 10px !important;
  }
  body.mobile-on #joyKnob{ width: 72px !important; height: 72px !important; }

  /* ---------- BUTTONS: больше + дальше ---------- */
  body.mobile-on .touchBtns{
    position:absolute !important;
    right: 10px !important;
    bottom: 10px !important;
    top: auto !important;

    width: 300px !important;   /* больше расстояние */
    height: 300px !important;

    pointer-events:auto !important;
    z-index: 6500 !important;
  }

  body.mobile-on .tbtn{
    position:absolute !important;
    width: 96px !important;     /* чуть больше */
    height: 96px !important;
    border-radius: 50% !important;
    padding:0 !important;
    display:grid !important;
    place-items:center !important;
    font-size: 12px !important;
    font-weight: 1200 !important;
    box-shadow: 0 10px 0 rgba(21,19,26,.10) !important;
  }
  body.mobile-on .tbtn:active{
    transform: translateY(8px) !important;
    box-shadow: 0 4px 0 rgba(21,19,26,.10) !important;
  }

  /* Ромб с большим разносом: центр = (102,102) */
  body.mobile-on #btnTSprint{ left: 102px !important; top: 0px !important; }
  body.mobile-on #btnTPass  { left: 0px   !important; top: 102px !important; }
  body.mobile-on #btnTShot  { right: 0px  !important; top: 102px !important; }
  body.mobile-on #btnTKick  { left: 102px !important; bottom: 0px !important; }

  body.mobile-on #btnTSprint{ background: rgba(60,255,143,.25) !important; border-color: rgba(60,255,143,.35) !important; }
  body.mobile-on #btnTPass  { background: rgba(33,215,255,.22) !important; border-color: rgba(33,215,255,.30) !important; }
  body.mobile-on #btnTShot  { background: rgba(255,45,160,.18) !important; border-color: rgba(255,45,160,.26) !important; }
  body.mobile-on #btnTKick  { background: rgba(255,122,0,.20) !important; border-color: rgba(255,122,0,.30) !important; }

  body.mobile-on .tbtn.on{ filter: brightness(1.08); }

  @media (max-width: 380px){
    body.mobile-on #joyBase{ width: 172px !important; height: 172px !important; }
    body.mobile-on .touchBtns{ width: 276px !important; height: 276px !important; }
    body.mobile-on .tbtn{ width: 90px !important; height: 90px !important; }
    body.mobile-on #btnTSprint, body.mobile-on #btnTKick{ left: 93px !important; }
    body.mobile-on #btnTPass, body.mobile-on #btnTShot{ top: 93px !important; }
  }
</style>

<script id="P1_5_MOBILE_V5_SCRIPT">
(() => {
  const $ = (s,r=document)=>r.querySelector(s);

  // mobile detect
  const isTouch = matchMedia("(pointer: coarse)").matches || ("ontouchstart" in window);
  document.body.classList.toggle("mobile-on", isTouch);
  document.body.classList.toggle("mobile-off", !isTouch);
  if(!isTouch) return;

  // По умолчанию: свернуть тренера (чтобы не мешал)
  document.body.classList.add("mobile-coach-collapsed");

  // Тап по шапке тренера — раскрыть/свернуть
  const coach = document.querySelector(".coach");
  const coachHd = coach ? coach.querySelector(".coachHd") : null;
  if(coachHd){
    coachHd.style.cursor = "pointer";
    coachHd.addEventListener("click", (e)=>{
      e.preventDefault();
      const collapsed = document.body.classList.contains("mobile-coach-collapsed");
      document.body.classList.toggle("mobile-coach-collapsed", !collapsed);
      document.body.classList.toggle("mobile-coach-expanded", collapsed);
    });
  }

  // ensure globals
  if(typeof window.joy !== "object") window.joy = {x:0,y:0,active:false,id:null,cx:0,cy:0};
  if(typeof window.aim !== "object") window.aim = {x:1,y:0,active:false,id:null,cx:0,cy:0};

  // Elements
  const joyBase = $("#joyBase");
  const joyKnob = $("#joyKnob");
  const btnSprint = $("#btnTSprint");
  const btnPass = $("#btnTPass");
  const btnShot = $("#btnTShot");

  // Add KICK if missing
  const btnsWrap = document.querySelector(".touchBtns");
  let btnKick = $("#btnTKick");
  if(btnsWrap && !btnKick){
    btnKick = document.createElement("button");
    btnKick.className = "tbtn";
    btnKick.id = "btnTKick";
    btnKick.type = "button";
    btnKick.textContent = "KICK";
    btnsWrap.appendChild(btnKick);
  }

  // ---------- Улучшаем сцепление на телефоне (чуть-чуть) ----------
  // CONTROL и PHYS существуют в Part 1. Это НЕ “липнет намертво”, просто легче вести.
  try{
    if(typeof CONTROL === "object"){
      CONTROL.extraReach = Math.min(0.70, (CONTROL.extraReach ?? 0.55) + 0.08);   // радиус чуть больше
      CONTROL.pocketSpring = (CONTROL.pocketSpring ?? 14.0) + 2.8;              // сильнее подтягивание
      CONTROL.pocketDamp   = Math.max(1.2, (CONTROL.pocketDamp ?? 2.0) - 0.35);  // меньше демпф → живее и липче
    }
    if(typeof PHYS === "object"){
      // чуть больше трения → мяч меньше “убегает”
      PHYS.friction60 = Math.max(0.980, (PHYS.friction60 ?? 0.987) - 0.003);
    }
  }catch{}

  // ---------- DRIFT FIX + One stick aim ----------
  const CFG = {
    maxR: 64,
    dead: 0.24,
    smooth: 0.22,
    aimFromMoveDead: 0.26,
    snapZero: 0.07
  };

  let joyTX=0, joyTY=0;
  let lastAimX=1, lastAimY=0;

  function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
  function norm(x,y){ const l=Math.hypot(x,y)||1; return {x:x/l, y:y/l}; }

  function setKnob(dx, dy){
    const r = Math.hypot(dx,dy);
    const k = r>CFG.maxR ? CFG.maxR/r : 1;
    joyKnob.style.transform = `translate(${dx*k}px, ${dy*k}px) translate(-50%,-50%)`;
  }
  function applyDead(x,y){
    const r = Math.hypot(x,y);
    if(r < CFG.dead) return {x:0,y:0};
    const rr = (r-CFG.dead)/(1-CFG.dead);
    const n = norm(x,y);
    return {x:n.x*rr, y:n.y*rr};
  }

  joyBase.addEventListener("pointerdown",(e)=>{
    if(typeof ensureAudio==="function") ensureAudio();
    joy.active=true;
    joy.id=e.pointerId;
    const r=joyBase.getBoundingClientRect();
    joy.cx=r.left+r.width/2;
    joy.cy=r.top+r.height/2;
    joyBase.setPointerCapture(e.pointerId);
  }, {passive:false});

  joyBase.addEventListener("pointermove",(e)=>{
    if(!joy.active || e.pointerId!==joy.id) return;
    e.preventDefault();

    const dx=e.clientX-joy.cx;
    const dy=e.clientY-joy.cy;
    setKnob(dx,dy);

    let x=clamp(dx/CFG.maxR,-1,1);
    let y=clamp(dy/CFG.maxR,-1,1);

    const d=applyDead(x,y);
    joyTX=d.x; joyTY=d.y;

    const mag=Math.hypot(d.x,d.y);
    if(mag > CFG.aimFromMoveDead){
      const n=norm(d.x,d.y);
      lastAimX=n.x; lastAimY=n.y;
    }
  }, {passive:false});

  function stopJoy(e){
    if(e && e.pointerId!==joy.id) return;
    joy.active=false; joy.id=null;
    joyTX=0; joyTY=0;
    joy.x=0; joy.y=0;
    joyKnob.style.transform="translate(-50%,-50%)";
  }
  joyBase.addEventListener("pointerup", stopJoy, {passive:false});
  joyBase.addEventListener("pointercancel", stopJoy, {passive:false});

  function smoothLoop(){
    if(!joy.active){ joyTX=0; joyTY=0; }

    joy.x = joy.x + (joyTX - joy.x)*CFG.smooth;
    joy.y = joy.y + (joyTY - joy.y)*CFG.smooth;

    if(Math.abs(joy.x) < CFG.snapZero) joy.x = 0;
    if(Math.abs(joy.y) < CFG.snapZero) joy.y = 0;

    aim.x = aim.x + (lastAimX - aim.x)*0.30;
    aim.y = aim.y + (lastAimY - aim.y)*0.30;

    requestAnimationFrame(smoothLoop);
  }
  requestAnimationFrame(smoothLoop);

  // ---------- PASS/SHOT hold ----------
  function callTouchCharge(type, down){
    if(typeof touchCharge === "function"){
      touchCharge(type, down);
      return;
    }
    if(typeof kick === "function" && down===false){
      kick(type==="pass"?280:380);
    }
  }

  if(btnPass){
    btnPass.addEventListener("pointerdown",(e)=>{ e.preventDefault(); callTouchCharge("pass", true); btnPass.classList.add("on"); }, {passive:false});
    btnPass.addEventListener("pointerup",(e)=>{ e.preventDefault(); callTouchCharge("pass", false); btnPass.classList.remove("on"); }, {passive:false});
    btnPass.addEventListener("pointercancel",(e)=>{ e.preventDefault(); callTouchCharge("pass", false); btnPass.classList.remove("on"); }, {passive:false});
  }
  if(btnShot){
    btnShot.addEventListener("pointerdown",(e)=>{ e.preventDefault(); callTouchCharge("shot", true); btnShot.classList.add("on"); }, {passive:false});
    btnShot.addEventListener("pointerup",(e)=>{ e.preventDefault(); callTouchCharge("shot", false); btnShot.classList.remove("on"); }, {passive:false});
    btnShot.addEventListener("pointercancel",(e)=>{ e.preventDefault(); callTouchCharge("shot", false); btnShot.classList.remove("on"); }, {passive:false});
  }

  // ---------- KICK ----------
  if(btnKick){
    btnKick.addEventListener("click",(e)=>{
      e.preventDefault();
      if(typeof kick === "function" && typeof PHYS === "object" && PHYS.lightKick){
        kick(PHYS.lightKick);
      } else if(typeof kick === "function"){
        kick(160);
      }
    });
  }

  // ---------- SPRINT FIX (железно) ----------
  // Эмулируем Shift, чтобы включался тот же тумблер, что и на ПК.
  function toggleSprintByShift(){
    try{
      window.dispatchEvent(new KeyboardEvent("keydown",{code:"ShiftLeft"}));
      window.dispatchEvent(new KeyboardEvent("keyup",{code:"ShiftLeft"}));
    }catch{}
  }

  // синхронизируем подсветку кнопки с реальным текстом ON/OFF
  function syncSprintButton(){
    const modeEl = document.getElementById("sprintMode");
    if(!modeEl || !btnSprint) { requestAnimationFrame(syncSprintButton); return; }
    const on = (modeEl.textContent || "").trim().toUpperCase() === "ON";
    btnSprint.classList.toggle("on", on);
    requestAnimationFrame(syncSprintButton);
  }
  requestAnimationFrame(syncSprintButton);

  if(btnSprint){
    btnSprint.addEventListener("click",(e)=>{
      e.preventDefault();
      if(typeof ensureAudio==="function") ensureAudio();
      toggleSprintByShift();
    });
  }

  // vibro
  function vib(ms=14){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch{} }
  if(btnPass) btnPass.addEventListener("pointerdown", ()=>vib(10));
  if(btnShot) btnShot.addEventListener("pointerdown", ()=>vib(12));
  if(btnKick) btnKick.addEventListener("click", ()=>vib(8));
  if(btnSprint) btnSprint.addEventListener("click", ()=>vib(8));

})();
</script>
